<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ирек Гайнемухаметов — Вокал для начинающих</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite; opacity: 0; }
        @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:var(--max-opacity);transform:scale(1)} }

        .nebula {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 600px; height: 600px;
            background: radial-gradient(ellipse, rgba(0,210,200,0.07) 0%, rgba(0,150,180,0.03) 40%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            animation: nebulaPulse 8s ease-in-out infinite;
        }
        @keyframes nebulaPulse { 0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} }

        .card {
            position: relative; z-index: 1; width: 440px; max-width: 92vw;
            background: linear-gradient(145deg, rgba(20,25,35,0.9), rgba(10,15,25,0.95));
            border: 1px solid rgba(0,210,200,0.15); border-radius: 24px;
            padding: 44px 36px; text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0,210,200,0.08), 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: cardAppear 1s ease-out;
        }
        @keyframes cardAppear { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        .card::before {
            content:''; position:absolute; top:-1px; left:30px; right:30px; height:2px;
            background: linear-gradient(90deg, transparent, rgba(0,210,200,0.5), transparent); border-radius:2px;
        }

        /* Round Logo */
        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 28px; position: relative;
        }
        .logo-ring-outer {
            position: absolute; top: -8px; left: -8px; width: 156px; height: 156px;
            border-radius: 50%; border: 2px solid transparent;
            border-top-color: rgba(0,210,200,0.6); border-right-color: rgba(0,210,200,0.2);
            animation: spinRing 5s linear infinite;
        }
        .logo-ring-inner {
            position: absolute; top: -4px; left: -4px; width: 148px; height: 148px;
            border-radius: 50%; border: 1px solid transparent;
            border-bottom-color: rgba(0,210,200,0.4); border-left-color: rgba(0,210,200,0.15);
            animation: spinRing 3s linear infinite reverse;
        }
        @keyframes spinRing { to{transform:rotate(360deg)} }

        .logo-circle {
            width: 140px; height: 140px; border-radius: 50%; position: relative; z-index: 1;
            background: linear-gradient(145deg, #0d1117, #0a0f18);
            border: 2px solid rgba(0,210,200,0.25);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,210,200,0.1), inset 0 0 20px rgba(0,210,200,0.03);
        }
        .logo-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 160px; height: 160px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,210,200,0.1), transparent 70%);
            filter: blur(10px); animation: logoGlow 4s ease-in-out infinite; z-index: 0;
        }
        @keyframes logoGlow { 0%,100%{opacity:0.4} 50%{opacity:1} }

        /* Microphone SVG inside logo */
        .logo-mic { margin-bottom: 2px; }

        .logo-text-top {
            font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            color: #fff; line-height: 1;
        }
        .logo-text-bottom {
            font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            color: #00d2c8; line-height: 1;
        }

        /* Name */
        .name {
            font-size: 28px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px;
            background: linear-gradient(135deg, #00d2c8, #00e5ff, #00d2c8, #48f0e0);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientShift 6s ease infinite; position: relative;
        }
        .name::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #00d2c8, #00e5ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: blur(20px); opacity: 0.5; z-index: -1;
        }
        @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .specialization {
            font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 6px;
            letter-spacing: 2.5px; text-transform: uppercase; font-weight: 300;
        }
        .tagline {
            font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 28px;
            line-height: 1.5; font-weight: 400;
        }
        .tagline span { color: #00d2c8; font-weight: 500; }

        .divider { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,210,200,0.5), transparent); margin: 0 auto 24px; }

        /* Features */
        .features { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
        .feature { text-align: center; }
        .feature-icon {
            width: 44px; height: 44px; margin: 0 auto 8px;
            background: rgba(0,210,200,0.08); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,210,200,0.1); transition: all 0.3s ease;
        }
        .feature:hover .feature-icon { background: rgba(0,210,200,0.15); border-color: rgba(0,210,200,0.3); transform: translateY(-2px); }
        .feature-icon svg { width: 20px; height: 20px; stroke: #00d2c8; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .feature-text { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.5px; }

        /* Reviews link */
        .reviews-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px;
            margin-bottom: 24px; padding: 10px 20px; border-radius: 12px;
            border: 1px solid rgba(0,210,200,0.1); background: rgba(0,210,200,0.04);
            transition: all 0.3s ease;
        }
        .reviews-link:hover {
            color: #00d2c8; border-color: rgba(0,210,200,0.3);
            background: rgba(0,210,200,0.08); transform: translateY(-1px);
        }
        .reviews-link svg { width: 18px; height: 18px; fill: none; stroke: #00d2c8; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        /* CTA */
        .cta-wrapper { position: relative; display: inline-block; margin-bottom: 28px; }
        .cta-pulse {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 100%; height: 100%; border-radius: 50px;
            border: 2px solid rgba(0,210,200,0.3); animation: pulse 2.5s ease-out infinite; pointer-events: none;
        }
        @keyframes pulse { 0%{transform:translate(-50%,-50%) scale(1);opacity:1} 100%{transform:translate(-50%,-50%) scale(1.3);opacity:0} }

        .cta-button {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 16px 40px; background: linear-gradient(135deg, #00b8a9, #00d2c8);
            color: #0a0a0a; text-decoration: none; border-radius: 50px;
            font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
            position: relative; overflow: hidden; transition: all 0.4s ease;
            box-shadow: 0 4px 20px rgba(0,210,200,0.25);
        }
        .cta-button::before {
            content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }
        .cta-button:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 35px rgba(0,210,200,0.4); }
        .cta-button:hover::before { left: 100%; }
        .cta-button:active { transform: translateY(0) scale(0.98); }
        .cta-button svg { width: 20px; height: 20px; fill: #0a0a0a; transition: transform 0.3s ease; }
        .cta-button:hover svg { transform: translateX(3px); }

        /* Social */
        .social { display: flex; justify-content: center; gap: 14px; margin-bottom: 24px; }
        .social-item { display: flex; flex-direction: column; align-items: center; }
        .social-link {
            width: 48px; height: 48px; border-radius: 14px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; text-decoration: none; position: relative; overflow: hidden;
        }
        .social-link::before {
            content:''; position:absolute; top:0;left:0;right:0;bottom:0;
            background: linear-gradient(135deg, rgba(0,210,200,0.15), rgba(0,150,180,0.1));
            opacity: 0; transition: opacity 0.3s ease; border-radius: 14px;
        }
        .social-link:hover { border-color: rgba(0,210,200,0.4); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,210,200,0.15); }
        .social-link:hover::before { opacity: 1; }
        .social-link svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.5); position: relative; z-index: 1; transition: fill 0.3s ease; }
        .social-link:hover svg { fill: #00d2c8; }
        .social-label { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 4px; }

        .footer { font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

        @media (max-width: 480px) {
            .card { padding: 32px 20px; border-radius: 20px; }
            .name { font-size: 22px; }
            .tagline { font-size: 16px; }
            .logo-container { width: 120px; height: 120px; }
            .logo-circle { width: 120px; height: 120px; }
            .logo-ring-outer { width: 136px; height: 136px; top:-8px; left:-8px; }
            .logo-ring-inner { width: 128px; height: 128px; top:-4px; left:-4px; }
            .logo-text-top, .logo-text-bottom { font-size: 11px; letter-spacing: 2px; }
            .features { gap: 14px; }
            .cta-button { padding: 14px 32px; font-size: 15px; }
            .nebula { width: 350px; height: 350px; }
        }
    </style>
</head>
